name: Render & Publish

# Holt je Gruppe das geteilte Google Slides als PDF (Rendering, korrekte
# Schriften von Google) und als PPTX (nur fuer die Notizen/Dauer), erzeugt
# manifest.json und veroeffentlicht alles auf GitHub Pages DIESES Repos.
#
# Keine Secrets: Google-Export ist oeffentlich, Pages-Push laeuft ueber den
# automatischen GITHUB_TOKEN. Aenderungserkennung ueber den Hash der Folien.

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'      # oeffentliches Repo = unbegrenzte Minuten
  push:
    paths:
      - 'groups/**'
      - 'admin/**'
      - 'tools/build_manifest.py'
      - 'tools/normalize_slides.py'
      - 'tools/make_groups_index.py'
      - '.github/workflows/render-publish.yml'

permissions:
  contents: write               # fuer den Push auf gh-pages

env:
  PAGES_BASE: https://romaneigenmann88-jpg.github.io/schule-neckertal-signage

jobs:
  render-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: poppler + python-pptx installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python3 -m pip install --quiet python-pptx

      - name: Alle Gruppen rendern und Manifeste erzeugen
        id: render
        run: |
          set -e
          rm -rf publish && mkdir -p publish
          : > publish/.nojekyll
          VERSION=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SAFEVER="${VERSION//:/-}"
          changed=false
          for dir in groups/*/; do
            gid=$(basename "$dir")
            [ -f "${dir}config.json" ] || continue
            gid_src=$(python3 -c "import json;print(json.load(open('${dir}config.json')).get('source',{}).get('googleSlidesId',''))")
            [ -n "$gid_src" ] || { echo "Ueberspringe $gid (keine googleSlidesId)"; continue; }
            echo "::group::Gruppe $gid"
            work=$(mktemp -d)
            echo "Hole Google-Export (PDF + PPTX) ..."
            curl -sL -o "$work/g.pdf"  "https://docs.google.com/presentation/d/$gid_src/export/pdf"
            curl -sL -o "$work/g.pptx" "https://docs.google.com/presentation/d/$gid_src/export/pptx"
            slidesdir="publish/groups/$gid/slides/$SAFEVER"
            mkdir -p "$slidesdir"
            pdftoppm -png -scale-to-x 1920 -scale-to-y -1 "$work/g.pdf" "$slidesdir/slide"
            python3 tools/normalize_slides.py "$slidesdir"
            # Hash der gerenderten Folien (stabil bei unveraendertem Inhalt)
            hash=$(cat "$slidesdir"/*.png | sha256sum | cut -d' ' -f1)
            pub=$(curl -s "${PAGES_BASE}/groups/$gid/manifest.json?n=$RANDOM$RANDOM" \
                  | python3 -c "import sys,json;print(json.load(sys.stdin).get('sourceHash',''))" 2>/dev/null || echo "")
            echo "$gid: hash=$hash publiziert=$pub"
            [ "$hash" != "$pub" ] && changed=true
            python3 tools/build_manifest.py \
              --config "${dir}config.json" \
              --pptx "$work/g.pptx" \
              --slides-dir "$slidesdir" \
              --output "publish/groups/$gid/manifest.json" \
              --version "$VERSION" \
              --slides-rel "slides/$SAFEVER" \
              --source-hash "$hash"
            echo "::endgroup::"
          done
          # push / workflow_dispatch: immer veroeffentlichen; schedule: nur bei Aenderung
          proceed=false
          case "${{ github.event_name }}" in
            schedule) [ "$changed" = "true" ] && proceed=true ;;
            *) proceed=true ;;
          esac
          # Admin-Konsole als Pages-Root + Setup-Skript mitveroeffentlichen
          cp -r admin/. publish/
          cp pi/setup.sh publish/setup.sh
          cp pi/add-heartbeat.sh publish/add-heartbeat.sh
          # groups.json (Index fuer die Admin-Konsole)
          python3 tools/make_groups_index.py "$VERSION"
          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"
          echo "Aenderung: $changed -> veroeffentlichen: $proceed"

      - name: Auf GitHub Pages veroeffentlichen
        if: steps.render.outputs.proceed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./publish
          keep_files: false
          commit_message: "Render & Publish ${{ github.sha }}"
