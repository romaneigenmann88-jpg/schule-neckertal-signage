name: Render & Publish

# Holt die PowerPoint je Gruppe aus SharePoint (Microsoft Graph), rendert sie zu
# PNG, erzeugt manifest.json und veroeffentlicht alles ins oeffentliche
# Pages-Repo, das der Pi abruft.
#
# Trigger:
#  - workflow_dispatch / push: immer rendern (manuell bzw. Konfig-Aenderung)
#  - schedule: nur rendern, wenn sich eine PPTX geaendert hat (cTag-Vergleich),
#    um GitHub-Actions-Minuten zu sparen.

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  push:
    paths:
      - 'groups/**'
      - 'tools/build_manifest.py'
      - 'tools/normalize_slides.py'
      - 'tools/fetch_pptx.py'
      - '.github/workflows/render-publish.yml'

env:
  PAGES_BASE: https://romaneigenmann88-jpg.github.io/schule-neckertal-signage-published

jobs:
  render-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Aenderungspruefung (cTag)
        id: check
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          set -e
          proceed=false
          # Bei manuellem Start oder Push immer rendern
          if [ "${{ github.event_name }}" != "schedule" ]; then proceed=true; fi
          for dir in groups/*/; do
            gid=$(basename "$dir")
            [ -f "${dir}config.json" ] || continue
            siteId=$(python3 -c "import json;print(json.load(open('${dir}config.json')).get('source',{}).get('siteId',''))")
            filePath=$(python3 -c "import json;print(json.load(open('${dir}config.json')).get('source',{}).get('filePath',''))")
            [ -n "$siteId" ] && [ -n "$filePath" ] || continue
            live=$(python3 tools/fetch_pptx.py --site-id "$siteId" --file-path "$filePath" --metadata-only)
            pub=$(curl -s "${PAGES_BASE}/groups/$gid/manifest.json?n=$RANDOM$RANDOM" \
                  | python3 -c "import sys,json;print(json.load(sys.stdin).get('sourceCTag',''))" 2>/dev/null || echo "")
            echo "$gid: live='$live' publiziert='$pub'"
            if [ "$live" != "$pub" ]; then proceed=true; fi
          done
          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"
          echo "Rendern/Veroeffentlichen: $proceed"

      - name: LibreOffice, poppler, Schriften und python-pptx installieren
        if: steps.check.outputs.proceed == 'true'
        run: |
          set -e
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            libreoffice poppler-utils fontconfig fonts-comfortaa ttf-mscorefonts-installer || true
          python3 -m pip install --quiet python-pptx fonttools
          mkdir -p "$HOME/.fonts"
          # Caveat (variabel) + korrekt benannte 'Caveat SemiBold' erzeugen
          curl -fsSL "https://github.com/google/fonts/raw/main/ofl/caveat/Caveat%5Bwght%5D.ttf" -o /tmp/Caveat.ttf
          cp /tmp/Caveat.ttf "$HOME/.fonts/Caveat.ttf"
          python3 tools/make_caveat_semibold.py /tmp/Caveat.ttf "$HOME/.fonts/CaveatSemiBold.ttf"
          fc-cache -f
          echo "=== Caveat-Schriften ==="; fc-list | grep -i caveat || echo "(keine gefunden)"

      - name: Alle Gruppen rendern und Manifeste erzeugen
        if: steps.check.outputs.proceed == 'true'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          set -e
          rm -rf publish && mkdir -p publish
          : > publish/.nojekyll
          printf '%s\n' '<!doctype html><meta charset=utf-8><title>Schule Neckertal Signage</title><h1>Signage – veröffentlichte Inhalte</h1><p>Gruppen unter <code>/groups/&lt;groupId&gt;/manifest.json</code></p>' > publish/index.html
          VERSION=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SAFEVER="${VERSION//:/-}"
          echo "Version: $VERSION (Ordner: $SAFEVER)"
          for dir in groups/*/; do
            gid=$(basename "$dir")
            [ -f "${dir}config.json" ] || { echo "Ueberspringe $gid (keine config.json)"; continue; }
            echo "::group::Gruppe $gid"
            siteId=$(python3 -c "import json;print(json.load(open('${dir}config.json')).get('source',{}).get('siteId',''))")
            filePath=$(python3 -c "import json;print(json.load(open('${dir}config.json')).get('source',{}).get('filePath',''))")
            ctag=""
            if [ -n "$siteId" ] && [ -n "$filePath" ]; then
              echo "Hole PPTX aus SharePoint: $filePath"
              ctag=$(python3 tools/fetch_pptx.py --site-id "$siteId" --file-path "$filePath" --output "${dir}source.pptx")
            fi
            [ -f "${dir}source.pptx" ] || { echo "Ueberspringe $gid (keine source.pptx)"; echo "::endgroup::"; continue; }
            work=$(mktemp -d)
            soffice --headless --convert-to pdf --outdir "$work" "${dir}source.pptx"
            pdf=$(ls "$work"/*.pdf | head -1)
            slidesdir="publish/groups/$gid/slides/$SAFEVER"
            mkdir -p "$slidesdir"
            pdftoppm -png -scale-to-x 1920 -scale-to-y -1 "$pdf" "$slidesdir/slide"
            python3 tools/normalize_slides.py "$slidesdir"
            python3 tools/build_manifest.py \
              --config "${dir}config.json" \
              --pptx "${dir}source.pptx" \
              --slides-dir "$slidesdir" \
              --output "publish/groups/$gid/manifest.json" \
              --version "$VERSION" \
              --slides-rel "slides/$SAFEVER" \
              --source-ctag "$ctag"
            echo "::endgroup::"
          done
          echo "=== Veroeffentlichte Struktur ==="
          find publish -type f | sort

      - name: Auf oeffentliches Pages-Repo veroeffentlichen
        if: steps.check.outputs.proceed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: romaneigenmann88-jpg/schule-neckertal-signage-published
          publish_branch: gh-pages
          publish_dir: ./publish
          keep_files: false
          commit_message: "Render & Publish ${{ github.sha }}"
